name: college_bus_tracker
description: A new Flutter project for college bus tracking.
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # 🗺️ MAPS & NAVIGATION
  google_maps_flutter: ^2.10.0
  url_launcher: ^6.2.0
  google_places_flutter: ^2.1.1
  flutter_polyline_points: ^3.1.0

  # 🔥 FIREBASE CORE
  firebase_core: ^4.1.1
  cloud_firestore: ^6.0.2
  firebase_auth: ^6.1.0

  # 🌐 NETWORKING (🔹 ADDED FOR THINGSPEAK)
  http: ^1.2.0

  # 🔔 NOTIFICATIONS & SENSORY ALERTS
  flutter_local_notifications: ^18.0.1 
  # 🔹 NEW: For Siren Sound on Admin Alerts
  audioplayers: ^6.1.0 
  # 🔹 NEW: For phone vibration on SOS
  vibration: ^2.1.0 

  # 📍 LOCATION & UTILS
  geolocator: ^13.0.0
  intl: ^0.19.0
  cupertino_icons: ^1.0.6
  web_socket_channel: ^3.0.0
  firebase_database: ^12.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  # 📂 ASSETS CONFIGURATION
  assets:
    - assets/images/splash.png
    - assets/images/home.png
    - assets/images/login.png
    # 🔹 NEW: Added a sound folder for the Siren/Alarm
    - assets/sounds/siren.mp3

# 🔹 APP ICON CONFIGURATION (ADDED)
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/app_icon.png"
  adaptive_icon_background: "#FFD31A"
  adaptive_icon_foreground: "assets/images/app_icon.png"